name: Salesforce-CI-CD

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

resources:
  containers:
    - container: buildAgent
      image: sfpipelineone.azurecr.io/image-one:latest
      endpoint: FisrstServiceConnection

pool:
  name: Default

variables:
  - group: Salesforce gr
  - name: isMain
    value: $[eq(variables['Build.SourceBranch'], 'refs/heads/main')]
  - name: isDevelop
    value: $[eq(variables['Build.SourceBranch'], 'refs/heads/develop')]
  - name: isPR
    value: $[eq(variables['Build.Reason'], 'PullRequest')]

stages:

  - stage: PrepareDelta
    displayName: "Stage 1 - Prepare Delta Package"
    jobs:
      - job: CheckChanges
        displayName: Check if force-app changed
        container: buildAgent
        steps:
          - checkout: self
            fetchDepth: 0

          - bash: |
              if [ "$(Build.Reason)" = "PullRequest" ]; then
                BASE_REF="origin/$(System.PullRequest.TargetBranch)"
              else
                BASE_REF="$(Build.SourceVersion)~1"
              fi

              git diff --name-status "$BASE_REF" HEAD
              echo ""

              FORCE_APP_CHANGED=$(git diff --name-status "$BASE_REF" HEAD -- force-app)
              if [ -z "$FORCE_APP_CHANGED" ]; then
                echo "(none)"
              else
                echo "$FORCE_APP_CHANGED"
              fi

              TOTAL=$(git diff --name-only "$BASE_REF" HEAD | wc -l | tr -d ' ')
              FORCE=$(git diff --name-only "$BASE_REF" HEAD -- force-app | wc -l | tr -d ' ')
              echo "Total files changed : $TOTAL"
              echo "force-app files     : $FORCE"

              if [ "$FORCE" = "0" ]; then
                echo "No changes in force-app. Skipping deeper checks."
                echo "##vso[task.setvariable variable=forceAppChanged;isOutput=true]false"
              else
                echo "Changes detected in force-app. Proceeding with full pipeline."
                echo "##vso[task.setvariable variable=forceAppChanged;isOutput=true]true"
              fi
            name: detectChanges
            displayName: Detect force-app changes

          - bash: |
              if [ "$(Build.Reason)" = "PullRequest" ]; then
                FROM_REF="origin/$(System.PullRequest.TargetBranch)"
              else
                FROM_REF="$(Build.SourceVersion)~1"
              fi

              mkdir -p delta
              sf sgd source delta --to $(Build.SourceVersion) --from "$FROM_REF" --repo-dir . --output-dir delta --generate-delta

              cat delta/package/package.xml

              if [ -f delta/destructiveChanges/destructiveChanges.xml ]; then
                cat delta/destructiveChanges/destructiveChanges.xml
              else
                echo "(no destructive changes)"
              fi

              if ! grep -q '<members>' delta/package/package.xml; then
                echo "##vso[task.setvariable variable=deltaEmpty;isOutput=true]true"
                echo "Delta package is empty."
              else
                echo "##vso[task.setvariable variable=deltaEmpty;isOutput=true]false"
              fi
            name: generateDelta
            displayName: Generate delta package
            condition: eq(variables['detectChanges.forceAppChanged'], 'true')

          - task: PublishPipelineArtifact@1
            displayName: Save delta as artifact
            condition: eq(variables['generateDelta.deltaEmpty'], 'false')
            inputs:
              targetPath: delta
              artifact: delta-package

  - stage: Authenticate
    displayName: "Stage 2 - Authenticate Salesforce Orgs"
    dependsOn: PrepareDelta
    condition: |
      and(
        succeeded(),
        eq(dependencies.PrepareDelta.outputs['CheckChanges.detectChanges.forceAppChanged'], 'true')
      )
    jobs:
      - job: AuthOrgs
        displayName: JWT login to orgs
        container: buildAgent
        steps:
          - task: DownloadSecureFile@1
            displayName: Download dev private key
            name: devKey
            inputs:
              secureFile: Dev_Server.key

          - task: DownloadSecureFile@1
            displayName: Download QA private key
            name: qaKey
            inputs:
              secureFile: QA_Server.key

          - bash: |
              sf org login jwt --client-id $(Dev_ConsumerKey) --jwt-key-file $(devKey.secureFilePath) --username $(Dev_Username) --alias devOrg --set-default
              echo "Dev org authenticated"
            displayName: Authenticate dev org

          - bash: |
              sf org login jwt --client-id $(QA_ConsumerKey) --jwt-key-file $(qaKey.secureFilePath) --username $(QA_Username) --alias qaOrg
              echo "QA org authenticated"
            displayName: Authenticate QA org

  - stage: Validation
    displayName: "Stage 3 - Validate + Test + Static Analysis"
    dependsOn: Authenticate
    condition: succeeded()
    jobs:

      - job: ValidateAndTest
        displayName: Validate deployment and run Apex tests
        container: buildAgent
        steps:
          - task: DownloadSecureFile@1
            name: devKey
            inputs:
              secureFile: Dev_Server.key

          - bash: |
              sf org login jwt --client-id $(Dev_ConsumerKey) --jwt-key-file $(devKey.secureFilePath) --username $(Dev_Username) --alias devOrg --set-default
            displayName: Re-authenticate dev org

          - task: DownloadPipelineArtifact@2
            displayName: Download delta artifact
            inputs:
              artifactName: delta-package
              targetPath: delta

          - bash: |
              echo "=== Check-only deploy (validate) ==="
              if [ "$(Build.Reason)" = "PullRequest" ]; then
                sf project deploy validate --source-dir force-app --target-org devOrg --test-level RunLocalTests --wait 30
              else
                sf project deploy validate --manifest delta/package/package.xml --target-org devOrg --test-level RunLocalTests --wait 30
              fi
            displayName: Validate deployment (check-only)

          - bash: |
              mkdir -p test-results/apex
              sf apex run test --target-org devOrg --test-level RunLocalTests --result-format junit --output-dir test-results/apex --wait 20
            displayName: Run Apex tests

          - task: PublishTestResults@2
            displayName: Publish Apex test results
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: test-results/apex/*.xml
              testRunTitle: "Apex Tests — $(Build.SourceBranchName)"
              failTaskOnFailedTests: true

      - job: PMDAnalysis
        displayName: PMD static analysis
        container: buildAgent
        steps:
          - checkout: self
          - bash: |
              mkdir -p $(Build.SourcesDirectory)/test-results/pmd
              /opt/pmd/bin/run.sh pmd --dir force-app --rulesets category/apex/bestpractices.xml,category/apex/errorprone.xml,category/apex/performance.xml --format junit --report-file test-results/pmd/pmd-results.xml --minimum-priority 2 || true
            displayName: Run PMD on force-app

          - task: PublishTestResults@2
            displayName: Publish PMD results
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: test-results/pmd/pmd-results.xml
              testRunTitle: "PMD Analysis — $(Build.SourceBranchName)"
              failTaskOnFailedTests: true

      - job: Linting
        displayName: ESLint (LWC / Aura)
        container: buildAgent
        steps:
          - checkout: self
          - bash: |
              mkdir -p $(Build.SourcesDirectory)/test-results/eslint
              npx eslint $(Build.SourcesDirectory)/force-app --ext .js --format junit --output-file $(Build.SourcesDirectory)/test-results/eslint/eslint-results.xml || true
            displayName: Run ESLint

          - task: PublishTestResults@2
            displayName: Publish ESLint results
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: $(Build.SourcesDirectory)/test-results/eslint/eslint-results.xml
              testRunTitle: "ESLint — $(Build.SourceBranchName)"
              failTaskOnFailedTests: true

  - stage: Deploy
    displayName: "Stage 4 - Deploy"
    dependsOn: Validation
    condition: |
      and(
        succeeded('Validation'),
        ne(variables['Build.Reason'], 'PullRequest')
      )
    jobs:

      - deployment: DeployToDev
        displayName: Deploy to Dev org
        container: buildAgent
        condition: eq(variables['Build.SourceBranch'], 'refs/heads/develop')
        environment: dev
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadSecureFile@1
                  name: devKey
                  inputs:
                    secureFile: Dev_Server.key

                - bash: |
                    sf org login jwt --client-id $(Dev_ConsumerKey) --jwt-key-file $(devKey.secureFilePath) --username $(Dev_Username) --alias devOrg --set-default
                  displayName: Re-authenticate dev org

                - task: DownloadPipelineArtifact@2
                  inputs:
                    artifactName: delta-package
                    targetPath: delta

                - bash: |
                    echo "=== Deploying to Dev ==="
                    sf project deploy start --manifest delta/package/package.xml --target-org devOrg --test-level RunLocalTests --wait 20
                  displayName: Deploy delta to dev org

      - deployment: DeployToQA
        displayName: Deploy to QA org
        container: buildAgent
        condition: eq(variables['Build.SourceBranch'], 'refs/heads/main')
        environment: qa
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadSecureFile@1
                  name: qaKey
                  inputs:
                    secureFile: QA_Server.key

                - bash: |
                    sf org login jwt --client-id $(QA_ConsumerKey) --jwt-key-file $(qaKey.secureFilePath) --username $(QA_Username) --alias qaOrg
                  displayName: Re-authenticate QA org

                - task: DownloadPipelineArtifact@2
                  inputs:
                    artifactName: delta-package
                    targetPath: delta

                - bash: |
                    echo "=== Deploying to QA ==="
                    sf project deploy start --manifest delta/package/package.xml --target-org qaOrg --test-level RunLocalTests --wait 20
                  displayName: Deploy delta to QA org

  - stage: PostResults
    displayName: "Post - Parse results and notify PR"
    dependsOn:
      - Validation
      - Deploy
    condition: always()
    jobs:
      - job: PostToPR
        displayName: Post test results to PR
        container: buildAgent
        steps:
          - bash: |
              APEX_RESULTS="test-results/apex"
              COMMENT=""

              if ls $APEX_RESULTS/*.xml 1>/dev/null 2>&1; then
                TESTS=$(grep -h 'testsuite' $APEX_RESULTS/*.xml | head -1)
                TOTAL=$(echo "$TESTS" | grep -oP 'tests="\K[^"]+')
                FAILURES=$(echo "$TESTS" | grep -oP 'failures="\K[^"]+')
                ERRORS=$(echo "$TESTS" | grep -oP 'errors="\K[^"]+')
                COMMENT="**Apex Tests:** $TOTAL run, $FAILURES failures, $ERRORS errors"
              else
                COMMENT="**Apex Tests:** No results found."
              fi

              echo "$COMMENT"

              if [ "$(Build.Reason)" = "PullRequest" ]; then
                az devops configure --defaults organization=$(System.TeamFoundationCollectionUri) project=$(System.TeamProject)
                az repos pr comment create --id $(System.PullRequest.PullRequestId) --comment "$COMMENT"
              fi
            displayName: Parse and post test results to PR
            env:
              AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)